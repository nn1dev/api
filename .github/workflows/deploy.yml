name: Deploy Worker
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build & Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --outdir dist --upload-source-maps --var SENTRY_RELEASE:${{ github.sha }}
      - name: Install Sentry CLI
        run: curl -sL https://sentry.io/get-cli/ | sh
      - name: Upload sourcemaps to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_RELEASE: ${{ github.sha }}
        run: sentry-cli releases new $SENTRY_RELEASE --org=nn1dev --project=api && sentry-cli sourcemaps upload --org=nn1dev --project=api --release=$SENTRY_RELEASE --strip-prefix 'dist/..' dist
